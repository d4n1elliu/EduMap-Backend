name: .NET Backend CI/CD
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./wwwroot # This places it exactly where .NET expects it

      - name: Download Frontend Artifacts from Frontend Repo
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.MY_GITHUB_PAT }} # Your PAT with repo access
          repo: d4n1elliu/EduMap
          branch: main
          name: frontend-dist
          path: ./wwwroot
          search_artifacts: true

      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' # Matches your project settings

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'EduMap'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
          clean: false